name: release

on:
  push:
    branches: [main, 0.1.0-python]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v0.1.0-python

permissions:
  contents: write

jobs:
  release:
    if: >
      startsWith(github.ref, 'refs/tags/')
      || github.event_name == 'workflow_dispatch'
      || contains(github.event.head_commit.message, 'release workflow')
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || 'v0.1.0-python' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test
        run: python -m unittest -v

      - name: Build wheel and Nuitka binary
        run: |
          docker run --rm -v "$PWD:/src" -w /src python:3.11-bullseye bash -lc '
            set -e
            apt-get update
            apt-get install -y --no-install-recommends patchelf
            python -m pip install -U pip build
            python -m pip install ".[build]"
            python -m build
            python -m nuitka --mode=onefile --assume-yes-for-downloads \
              --python-flag=-m \
              --output-dir=dist --output-filename=vulnscan-wrapper-linux-amd64 \
              fast_scan_tool
            find dist -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > dist/SHA256SUMS
          '

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "Pure Python release with wheel, sdist, and Nuitka Linux amd64 binary."
          gh release upload "$RELEASE_TAG" dist/* --clobber
